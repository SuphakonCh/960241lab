<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page - Bootstrap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-white d-flex flex-column align-items-center py-5 min-vh-100">

    <header class="d-flex flex-column align-items-center mb-4">
        <img src="https://www.cmu.ac.th/content/Article/2023/7e6d8808-54b5-419d-b3da-99de6cce26f4/047c25cb-dee0-494e-b462-4f28f9e51ffd.jpg" alt="CAMT Logo" width="130" class="mb-3">
        
        <nav class="btn-group">
            <button type="button" class="btn btn-secondary px-4">Home</button>
            <button type="button" class="btn btn-danger px-4">Login</button>
        </nav>
    </header>

    <main class="w-100 d-flex flex-column align-items-center" style="max-width: 350px;">
        <h2 class="display-6 mb-4">หน้า Login</h2>
        
        <form action="/sendLogin" method="POST" class="w-100 d-flex flex-column align-items-center">
            
            <label class="form-label fs-5 mb-1" for="username">username</label>
            <input type="email" id="username" name="username" placeholder="Email" required 
                   class="form-control mb-3">

            <label class="form-label fs-5 mb-1" for="password">password</label>
            <input type="password" id="password" name="password" placeholder="Password" required 
                   class="form-control mb-4">

            <div class="d-flex align-items-center justify-content-center w-100 mb-4 gap-4">
                <button type="submit" class="btn btn-primary px-4">Login</button>
                <a href="signin.html" class="text-primary text-decoration-underline">Sign In</a>
            </div>
        </form>
    </main>

    <footer class="text-center text-secondary small mt-4">
        <p class="mb-0">page footer</p>
        <p class="mb-3">ที่อยู่ camt มช</p>
        
        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3777.1706691888285!2d98.95155207604509!3d18.79153098235549!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x30da3a60a7e174b1%3A0x6b490f23f6e1bc25!2sCollege%20of%20Arts%2C%20Media%20and%20Technology%20(CAMT)!5e0!3m2!1sen!2sth!4v1709230588828!5m2!1sen!2sth" 
                width="300" height="150" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
    </footer>

</body>
</html>
